<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group — Brickverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #7C3AED; --bg: #0F0F13; --surface: #1A1A24; --surface2: #22222F;
      --border: rgba(255,255,255,0.08); --text: #F0EFF8; --muted: #8B89A0;
      --tag-bg: rgba(124,58,237,0.18); --tag-color: #A78BFA;
      --green: #22C55E; --red: #EF4444; --amber: #F59E0B;
    }
    html, body { min-height: 100vh; background: var(--bg); font-family: 'Nunito Sans', sans-serif; color: var(--text); }

    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -0.5px; color: var(--text); display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 700; background: none; border: none; cursor: pointer; font-family: inherit; transition: color 0.15s; text-decoration: none; }
    .back-btn:hover { color: var(--text); }

    .btn { border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s, background 0.15s, border-color 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    .page { max-width: 900px; margin: 0 auto; padding: 0 24px 48px; }

    /* BANNER */
    .group-banner {
      height: 180px; width: 100%;
      background: linear-gradient(135deg, #1e1040, #0d2040, #0d2a2a);
      border-radius: 0 0 16px 16px; border: 1px solid var(--border); border-top: none;
      position: relative; overflow: hidden; margin-bottom: 0;
      display: flex; align-items: flex-end; padding: 20px 28px;
    }
    .group-banner img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .group-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%); }
    .group-banner-content { position: relative; z-index: 1; display: flex; align-items: flex-end; justify-content: space-between; width: 100%; }
    .group-name-hero { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 28px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .group-meta-hero { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }

    /* CONTENT GRID */
    .group-grid { display: grid; grid-template-columns: 1fr 280px; gap: 20px; margin-top: 20px; }
    @media (max-width: 680px) { .group-grid { grid-template-columns: 1fr; } }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .card-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

    /* TABS */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tab { padding: 9px 16px; font-size: 13px; font-weight: 700; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit; transition: color 0.15s, border-color 0.15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* WALL POST */
    .post { background: var(--surface2); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .post-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#7C3AED,#06B6D4); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; font-family: 'Nunito',sans-serif; color: #fff; overflow: hidden; flex-shrink: 0; }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-author { font-size: 13px; font-weight: 700; }
    .post-time { font-size: 11px; color: var(--muted); }
    .post-content { font-size: 14px; line-height: 1.6; word-break: break-word; }
    .post-delete { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; transition: color 0.12s; }
    .post-delete:hover { color: var(--red); }

    /* CHAT */
    .chat-area { display: flex; flex-direction: column; height: 340px; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
    .chat-msg { display: flex; flex-direction: column; max-width: 78%; }
    .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
    .chat-msg.theirs { align-self: flex-start; align-items: flex-start; }
    .chat-sender { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .chat-bubble { padding: 7px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-break: break-word; }
    .chat-msg.mine .chat-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
    .chat-msg.theirs .chat-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 3px; }
    .chat-time { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .chat-input-row { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 8px; }
    .chat-input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .chat-input-row input:focus { border-color: var(--accent); }

    /* MEMBERS */
    .member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#7C3AED,#06B6D4); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; font-family: 'Nunito',sans-serif; color: #fff; overflow: hidden; flex-shrink: 0; }
    .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .member-name { font-size: 13px; font-weight: 700; flex: 1; cursor: pointer; }
    .member-name:hover { color: var(--tag-color); }
    .role-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; }
    .role-owner { background: rgba(245,158,11,0.18); color: var(--amber); }
    .role-admin { background: var(--tag-bg); color: var(--tag-color); }
    .role-pending { background: rgba(239,68,68,0.15); color: var(--red); }

    /* FORM */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--accent); }
    textarea.form-input { resize: vertical; min-height: 80px; }
    select.form-input { cursor: pointer; }

    /* JOIN MODE BADGE */
    .join-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .join-open { background: rgba(34,197,94,0.12); color: var(--green); }
    .join-request { background: rgba(245,158,11,0.12); color: var(--amber); }
    .join-invite { background: rgba(139,137,160,0.15); color: var(--muted); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; position: relative; }
    .modal-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; margin-bottom: 20px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 13px; }
    .skeleton { background: var(--surface2); border-radius: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 600; z-index: 2000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }
  </style>
</head>
<body>

<header class="topbar">
  <a href="/" class="logo"><div class="logo-dot"></div>Brickverse</a>
  <a href="javascript:history.back()" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    Back
  </a>
  <div style="flex:1;"></div>
  <div id="topbarAuth"></div>
</header>

<div id="bannerArea"></div>

<div class="page">
  <div id="groupContent">
    <div class="skeleton" style="height:180px;border-radius:0 0 16px 16px;margin-bottom:20px;"></div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:20px;">
      <div><div class="skeleton" style="height:200px;border-radius:12px;"></div></div>
      <div><div class="skeleton" style="height:200px;border-radius:12px;"></div></div>
    </div>
  </div>
</div>

<!-- CREATE GROUP MODAL -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('createModal').classList.remove('open')">&times;</button>
    <div class="modal-title">Create Group</div>
    <div class="form-group">
      <label class="form-label">Group Name</label>
      <input class="form-input" id="createName" placeholder="e.g. Epic Builders" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="createDesc" placeholder="What's this group about?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Who can join?</label>
      <select class="form-input" id="createJoinMode">
        <option value="open">Anyone (open)</option>
        <option value="request">Request to join</option>
        <option value="invite">Invite only</option>
      </select>
    </div>
    <div id="createError" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="createGroup()">Create Group</button>
  </div>
</div>

<!-- INVITE MODAL -->
<div class="modal-overlay" id="inviteModal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('inviteModal').classList.remove('open')">&times;</button>
    <div class="modal-title">Invite Member</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="inviteUsername" placeholder="Enter username..." />
    </div>
    <div id="inviteError" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none;"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="inviteUser()">Send Invite</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://labor-headline-block-tough.trycloudflare.com';
  const accessToken = localStorage.getItem('bv_access') || null;
  let currentUser = null;
  let groupData   = null;
  let myRole      = null;
  let isMember    = false;
  let chatPoll    = null;

  async function apiFetch(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers||{}) };
    if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
    return fetch(API + path, { ...options, headers });
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
    if (d > 0) return `${d}d ago`;
    if (h > 0) return `${h}h ago`;
    if (m > 0) return `${m}m ago`;
    return 'just now';
  }

  function avatarHtml(user, size=34) {
    const initials = (user.display_name||user.username||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    return `<div class="post-avatar" style="width:${size}px;height:${size}px;">
      ${user.avatar_url ? `<img src="${user.avatar_url}" alt="" />` : initials}
    </div>`;
  }

  // ─── INIT ────────────────────────────────────────────────
  (async () => {
    if (accessToken) {
      const r = await apiFetch('/api/me');
      if (r.ok) currentUser = await r.json();
    }
    renderTopbar();

    const params  = new URLSearchParams(window.location.search);
    const groupId = params.get('g');
    if (!groupId) { renderBrowse(); return; }

    const res = await fetch(`${API}/api/groups/${groupId}`);
    if (!res.ok) { document.getElementById('groupContent').innerHTML = '<div class="empty-state" style="padding:60px;font-size:16px;">Group not found.</div>'; return; }
    groupData = await res.json();
    document.title = `${groupData.name} — Brickverse`;

    // Check membership
    if (currentUser) {
      const mr = await apiFetch('/api/me/groups');
      if (mr.ok) {
        const myGroups = await mr.json();
        const found = myGroups.find(g => g.id === groupId);
        if (found) { isMember = found.status === 'active'; myRole = found.role; }
      }
    }

    renderGroup();
  })();

  function renderTopbar() {
    const el = document.getElementById('topbarAuth');
    if (currentUser) {
      const initials = (currentUser.display_name||currentUser.username||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">
        <a href="/" style="font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;">Home</a>
        <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#06B6D4);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;overflow:hidden;">
          ${currentUser.avatar_url ? `<img src="${currentUser.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : initials}
        </div>
      </div>`;
    } else {
      el.innerHTML = `<a href="/" style="font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;">Log in</a>`;
    }
  }

  // ─── RENDER GROUP ────────────────────────────────────────
  function renderGroup() {
    const g = groupData;
    const joinBadgeClass = { open:'join-open', request:'join-request', invite:'join-invite' }[g.join_mode];
    const joinBadgeLabel = { open:'Open', request:'Request to join', invite:'Invite only' }[g.join_mode];

    // Banner
    document.getElementById('bannerArea').innerHTML = `
      <div class="group-banner">
        ${g.banner_url ? `<img src="${API}${g.banner_url}" alt="banner" />` : ''}
        <div class="group-banner-overlay"></div>
        <div class="group-banner-content">
          <div>
            <div class="group-name-hero">${escapeHtml(g.name)}</div>
            <div class="group-meta-hero">${g.member_count.toLocaleString()} members · <span class="join-badge ${joinBadgeClass}" style="display:inline-flex;">${joinBadgeLabel}</span></div>
          </div>
          <div style="display:flex;gap:8px;">${renderActionBtns()}</div>
        </div>
      </div>`;

    document.getElementById('groupContent').innerHTML = `
      <div class="group-grid">
        <div>
          <div class="tabs">
            <button class="tab active" onclick="switchTab(this,'wallTab')">Wall</button>
            <button class="tab" onclick="switchTab(this,'chatTab')">Chat</button>
            ${myRole==='owner'||myRole==='admin' ? '<button class="tab" onclick="switchTab(this,\'manageTab\')">Manage</button>' : ''}
          </div>

          <div id="wallTab">
            ${isMember ? `
              <div class="card" style="margin-bottom:12px;">
                <textarea class="form-input" id="postInput" placeholder="Write something on the wall..." style="min-height:70px;margin-bottom:10px;"></textarea>
                <button class="btn btn-primary btn-sm" onclick="submitPost()">Post</button>
              </div>` : ''}
            <div id="wallPosts"><div class="empty-state">Loading posts...</div></div>
          </div>

          <div id="chatTab" style="display:none;">
            ${isMember ? `
              <div class="card">
                <div class="chat-area">
                  <div class="chat-messages" id="chatMessages"></div>
                  <div class="chat-input-row">
                    <input id="chatInput" placeholder="Message the group..." />
                    <button class="btn btn-primary btn-sm" onclick="sendGroupChat()">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                  </div>
                </div>
              </div>` : '<div class="empty-state">Join the group to chat.</div>'}
          </div>

          <div id="manageTab" style="display:none;">
            <div class="card">
              <div class="card-title">Pending Requests</div>
              <div id="pendingMembers"><div class="empty-state">No pending requests.</div></div>
            </div>
            <div class="card">
              <div class="card-title">Upload Banner</div>
              <input type="file" id="bannerUpload" accept="image/*" style="font-size:13px;color:var(--muted);margin-bottom:10px;display:block;" />
              <button class="btn btn-primary btn-sm" onclick="uploadBanner()">Upload</button>
            </div>
          </div>
        </div>

        <div>
          <div class="card">
            <div class="card-title">About</div>
            <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px;">${g.description ? escapeHtml(g.description) : 'No description.'}</p>
            <div style="font-size:12px;color:var(--muted);">
              Owner: <a onclick="viewProfile('${g.owner?.username}')" style="color:var(--tag-color);cursor:pointer;">@${g.owner?.username}</a>
            </div>
          </div>
          <div class="card">
            <div class="card-title">
              Members
              ${isMember && (myRole==='owner'||myRole==='admin') ? `<button class="btn btn-ghost btn-sm" onclick="document.getElementById('inviteModal').classList.add('open')">Invite</button>` : ''}
            </div>
            <div id="membersList"><div class="empty-state">Loading...</div></div>
          </div>
        </div>
      </div>`;

    loadWall();
    loadMembers();
    if (isMember) {
      loadGroupChat();
      chatPoll = setInterval(loadGroupChat, 4000);
    }
    if (myRole==='owner'||myRole==='admin') loadPendingMembers();
  }

  function renderActionBtns() {
    if (!currentUser) return `<a href="/" class="btn btn-primary btn-sm">Sign in to join</a>`;
    if (myRole === 'owner') return `<span style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:700;">You own this group</span>`;
    if (isMember) return `<button class="btn btn-danger btn-sm" onclick="leaveGroup()">Leave Group</button>`;
    if (groupData.join_mode === 'invite') return `<span style="font-size:12px;color:rgba(255,255,255,0.5);">Invite only</span>`;
    return `<button class="btn btn-primary btn-sm" onclick="joinGroup()">${groupData.join_mode === 'request' ? 'Request to Join' : 'Join Group'}</button>`;
  }

  function switchTab(btn, tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    ['wallTab','chatTab','manageTab'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = id === tabId ? 'block' : 'none';
    });
    if (tabId === 'chatTab') { clearInterval(chatPoll); loadGroupChat(); chatPoll = setInterval(loadGroupChat, 4000); }
    else { clearInterval(chatPoll); }
  }

  // ─── WALL ────────────────────────────────────────────────
  async function loadWall() {
    const res = await fetch(`${API}/api/groups/${groupData.id}/posts`);
    const posts = res.ok ? await res.json() : [];
    const container = document.getElementById('wallPosts');
    if (!posts.length) { container.innerHTML = '<div class="empty-state">No posts yet. Be the first to post!</div>'; return; }
    container.innerHTML = posts.map(p => {
      const initials = (p.display_name||p.username||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const canDelete = currentUser && (p.author_id === currentUser.id || myRole==='owner' || myRole==='admin');
      return `<div class="post">
        <div class="post-header">
          <div class="post-avatar">${p.avatar_url ? `<img src="${p.avatar_url}" alt="" />` : initials}</div>
          <div style="flex:1;">
            <div class="post-author" style="cursor:pointer;" onclick="viewProfile('${p.username}')">${p.display_name||p.username}</div>
            <div class="post-time">${timeAgo(p.created_at)}</div>
          </div>
          ${canDelete ? `<button class="post-delete" onclick="deletePost('${p.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>` : ''}
        </div>
        <div class="post-content">${escapeHtml(p.content)}</div>
      </div>`;
    }).join('');
  }

  async function submitPost() {
    const content = document.getElementById('postInput').value.trim();
    if (!content) return;
    const res = await apiFetch(`/api/groups/${groupData.id}/posts`, { method:'POST', body: JSON.stringify({ content }) });
    if (res.ok) { document.getElementById('postInput').value = ''; loadWall(); }
    else { const d = await res.json(); showToast(d.error,'error'); }
  }

  async function deletePost(postId) {
    const res = await apiFetch(`/api/groups/${groupData.id}/posts/${postId}`, { method:'DELETE' });
    if (res.ok) loadWall();
  }

  // ─── CHAT ────────────────────────────────────────────────
  async function loadGroupChat() {
    const res = await apiFetch(`/api/groups/${groupData.id}/chat`);
    if (!res.ok) return;
    const msgs = await res.json();
    const container = document.getElementById('chatMessages');
    if (!container) return;
    const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
    container.innerHTML = msgs.map(m => {
      const mine = currentUser && m.sender_id === currentUser.id;
      const time = new Date(m.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      return `<div class="chat-msg ${mine?'mine':'theirs'}">
        ${!mine ? `<div class="chat-sender">${m.display_name||m.username}</div>` : ''}
        <div class="chat-bubble">${escapeHtml(m.content)}</div>
        <div class="chat-time">${time}</div>
      </div>`;
    }).join('');
    if (atBottom) container.scrollTop = container.scrollHeight;
  }

  async function sendGroupChat() {
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    const res = await apiFetch(`/api/groups/${groupData.id}/chat`, { method:'POST', body: JSON.stringify({ content }) });
    if (res.ok) loadGroupChat();
  }

  document.addEventListener('keydown', e => {
    const input = document.getElementById('chatInput');
    if (e.key === 'Enter' && document.activeElement === input) { e.preventDefault(); sendGroupChat(); }
  });

  // ─── MEMBERS ─────────────────────────────────────────────
  async function loadMembers() {
    const res = await fetch(`${API}/api/groups/${groupData.id}/members`);
    if (!res.ok) return;
    const members = (await res.json()).filter(m => m.status === 'active');
    const container = document.getElementById('membersList');
    container.innerHTML = members.map(m => {
      const initials = (m.display_name||m.username||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const roleHtml = m.role === 'owner'
        ? `<span class="role-badge role-owner">Owner</span>`
        : m.role === 'admin' ? `<span class="role-badge role-admin">Admin</span>` : '';
      const canManage = (myRole==='owner'||myRole==='admin') && m.role!=='owner' && currentUser?.id !== m.id;
      return `<div class="member-row">
        <div class="member-avatar">${m.avatar_url ? `<img src="${m.avatar_url}" alt="" />` : initials}</div>
        <div class="member-name" onclick="viewProfile('${m.username}')">${m.display_name||m.username}</div>
        ${roleHtml}
        ${canManage ? `
          <select onchange="memberAction('${m.id}',this.value);this.value=''" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 6px;font-size:11px;cursor:pointer;outline:none;">
            <option value="">Actions</option>
            ${m.role==='member' ? '<option value="promote">Promote to Admin</option>' : '<option value="demote">Demote to Member</option>'}
            <option value="kick">Kick</option>
          </select>` : ''}
      </div>`;
    }).join('') || '<div class="empty-state">No members yet.</div>';
  }

  async function loadPendingMembers() {
    const res = await fetch(`${API}/api/groups/${groupData.id}/members`);
    if (!res.ok) return;
    const pending = (await res.json()).filter(m => m.status === 'pending');
    const container = document.getElementById('pendingMembers');
    if (!container) return;
    if (!pending.length) { container.innerHTML = '<div class="empty-state">No pending requests.</div>'; return; }
    container.innerHTML = pending.map(m => `
      <div class="member-row">
        <div class="member-avatar" style="width:32px;height:32px;">${m.display_name||m.username||'?'}</div>
        <div class="member-name" onclick="viewProfile('${m.username}')">${m.display_name||m.username}</div>
        <span class="role-badge role-pending">Pending</span>
        <button class="btn btn-primary btn-sm" onclick="memberAction('${m.id}','approve')">Approve</button>
        <button class="btn btn-ghost btn-sm" onclick="memberAction('${m.id}','kick')">Deny</button>
      </div>`).join('');
  }

  async function memberAction(userId, action) {
    const res = await apiFetch(`/api/groups/${groupData.id}/members/${userId}/action`, { method:'POST', body: JSON.stringify({ action }) });
    if (res.ok) { loadMembers(); if (myRole==='owner'||myRole==='admin') loadPendingMembers(); }
    else { const d = await res.json(); showToast(d.error,'error'); }
  }

  // ─── JOIN / LEAVE ─────────────────────────────────────────
  async function joinGroup() {
    const res = await apiFetch(`/api/groups/${groupData.id}/join`, { method:'POST' });
    const d = await res.json();
    if (!res.ok) { showToast(d.error,'error'); return; }
    if (d.status === 'pending') showToast('Request sent! Waiting for approval.');
    else { showToast('Joined!'); isMember = true; myRole = 'member'; renderGroup(); }
  }

  async function leaveGroup() {
    const res = await apiFetch(`/api/groups/${groupData.id}/leave`, { method:'DELETE' });
    if (res.ok) { showToast('Left group.'); isMember = false; myRole = null; clearInterval(chatPoll); renderGroup(); }
    else { const d = await res.json(); showToast(d.error,'error'); }
  }

  // ─── INVITE ──────────────────────────────────────────────
  async function inviteUser() {
    const username = document.getElementById('inviteUsername').value.trim().toLowerCase();
    const errEl = document.getElementById('inviteError');
    errEl.style.display = 'none';
    if (!username) return;
    const res = await apiFetch(`/api/groups/${groupData.id}/invite/${username}`, { method:'POST' });
    const d = await res.json();
    if (!res.ok) { errEl.textContent = d.error; errEl.style.display = 'block'; return; }
    showToast(`@${username} added!`);
    document.getElementById('inviteModal').classList.remove('open');
    document.getElementById('inviteUsername').value = '';
    loadMembers();
  }

  // ─── BANNER UPLOAD ────────────────────────────────────────
  async function uploadBanner() {
    const fileInput = document.getElementById('bannerUpload');
    if (!fileInput.files[0]) return showToast('Select a file first','error');
    const form = new FormData();
    form.append('banner', fileInput.files[0]);
    const headers = {};
    if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
    const res = await fetch(`${API}/api/groups/${groupData.id}/banner`, { method:'POST', headers, body: form });
    if (res.ok) { showToast('Banner updated!'); location.reload(); }
    else { const d = await res.json(); showToast(d.error,'error'); }
  }

  // ─── BROWSE (no group id in URL) ─────────────────────────
  async function renderBrowse() {
    document.title = 'Groups — Brickverse';
    document.getElementById('groupContent').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;margin-top:20px;">
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;">Groups</div>
        ${currentUser ? `<button class="btn btn-primary" onclick="document.getElementById('createModal').classList.add('open')">+ Create Group</button>` : ''}
      </div>
      <div style="position:relative;margin-bottom:20px;">
        <input class="form-input" id="groupSearch" placeholder="Search groups..." style="padding-left:36px;" oninput="searchGroups(this.value)" />
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
      </div>
      <div id="groupsList"></div>`;
    searchGroups('');
  }

  let searchTimeout = null;
  async function searchGroups(q) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
      const res = await fetch(`${API}/api/groups?q=${encodeURIComponent(q)}`);
      const groups = res.ok ? await res.json() : [];
      const container = document.getElementById('groupsList');
      if (!groups.length) { container.innerHTML = '<div class="empty-state">No groups found.</div>'; return; }
      container.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;">` +
        groups.map(g => `
          <div class="card" style="cursor:pointer;" onclick="window.location='?g=${g.id}'">
            <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;margin-bottom:4px;">${escapeHtml(g.name)}</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;">${g.description ? escapeHtml(g.description.slice(0,80)) + (g.description.length>80?'…':'') : 'No description.'}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:12px;color:var(--muted);">${g.member_count.toLocaleString()} members</span>
              <span class="join-badge ${{open:'join-open',request:'join-request',invite:'join-invite'}[g.join_mode]}">${{open:'Open',request:'Request',invite:'Invite only'}[g.join_mode]}</span>
            </div>
          </div>`).join('') + `</div>`;
    }, 300);
  }

  async function createGroup() {
    const name = document.getElementById('createName').value.trim();
    const desc = document.getElementById('createDesc').value.trim();
    const mode = document.getElementById('createJoinMode').value;
    const errEl = document.getElementById('createError');
    errEl.style.display = 'none';
    if (!name) { errEl.textContent = 'Name is required'; errEl.style.display = 'block'; return; }
    const res = await apiFetch('/api/groups', { method:'POST', body: JSON.stringify({ name, description: desc, join_mode: mode }) });
    const d = await res.json();
    if (!res.ok) { errEl.textContent = d.error; errEl.style.display = 'block'; return; }
    window.location.href = `?g=${d.id}`;
  }

  function viewProfile(username) {
    window.open(`/profile.html?u=${encodeURIComponent(username)}`, '_blank');
  }
</script>
</body>
</html>
