<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Brickverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #7C3AED; --bg: #0F0F13; --surface: #1A1A24; --surface2: #22222F;
      --border: rgba(255,255,255,0.08); --text: #F0EFF8; --muted: #8B89A0;
      --tag-bg: rgba(124,58,237,0.18); --tag-color: #A78BFA;
      --green: #22C55E; --red: #EF4444;
    }
    html, body { min-height: 100vh; background: var(--bg); font-family: 'Nunito Sans', sans-serif; color: var(--text); }

    /* TOPBAR */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px;
      letter-spacing: -0.5px; color: var(--text); display: flex; align-items: center;
      gap: 8px; text-decoration: none;
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
    .back-btn {
      display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px;
      font-weight: 700; background: none; border: none; cursor: pointer;
      font-family: inherit; transition: color 0.15s; text-decoration: none;
    }
    .back-btn:hover { color: var(--text); }
    .topbar-spacer { flex: 1; }

    /* PAGE */
    .page { max-width: 720px; margin: 0 auto; padding: 32px 24px; }

    /* BANNER + AVATAR */
    .profile-banner {
      height: 140px; border-radius: 16px 16px 0 0;
      background: linear-gradient(135deg, #1e1040, #0d2040, #0d2a2a);
      border: 1px solid var(--border); border-bottom: none;
      position: relative;
    }
    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 0 0 16px 16px; padding: 0 28px 28px;
      margin-bottom: 24px;
    }
    .profile-avatar-wrap {
      margin-top: -44px; margin-bottom: 12px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .profile-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #7C3AED, #06B6D4);
      border: 4px solid var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 28px; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-actions { display: flex; gap: 8px; padding-bottom: 4px; }

    .btn {
      border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer; border: none; display: inline-flex;
      align-items: center; gap: 6px; transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    .profile-display-name {
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px; margin-bottom: 2px;
    }
    .profile-username { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
    .profile-bio { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 14px; }
    .profile-stats { display: flex; gap: 20px; }
    .profile-stat { text-align: center; }
    .profile-stat-num {
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px; color: var(--text);
    }
    .profile-stat-label { font-size: 11px; color: var(--muted); }

    .online-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
      border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700;
      color: var(--green); margin-bottom: 10px;
    }
    .online-dot-sm { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    /* TABS */
    .profile-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .profile-tab {
      padding: 10px 18px; font-size: 13px; font-weight: 700; color: var(--muted);
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; font-family: inherit; transition: color 0.15s, border-color 0.15s;
    }
    .profile-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* GAMES GRID */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .game-card {
      background: var(--surface2); border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .game-card:hover { transform: translateY(-2px); border-color: rgba(124,58,237,0.4); }
    .game-thumb {
      width: 100%; aspect-ratio: 4/3; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.2); background: linear-gradient(135deg,#1e0a3a,#3a1060);
    }
    .game-info { padding: 8px 10px 10px; }
    .game-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px; }
    .game-plays { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* EMPTY */
    .empty-state {
      text-align: center; padding: 48px 24px;
      border: 1px dashed var(--border); border-radius: 12px;
    }
    .empty-state p { color: var(--muted); font-size: 14px; }

    /* SKELETON */
    .skeleton { background: var(--surface2); border-radius: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 20px; font-size: 13px; font-weight: 600;
      z-index: 2000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="/" class="logo"><div class="logo-dot"></div>Brickverse</a>
    <a href="javascript:history.back()" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      Back
    </a>
    <div class="topbar-spacer"></div>
    <div id="topbarAuth"></div>
  </header>

  <div class="page">
    <div id="profileContent">
      <!-- skeleton while loading -->
      <div class="profile-banner skeleton" style="height:140px;border-radius:16px 16px 0 0;"></div>
      <div class="profile-card">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar skeleton" style="background:var(--surface2);"></div>
        </div>
        <div class="skeleton" style="height:24px;width:180px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:14px;width:100px;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:14px;width:100%;margin-bottom:6px;"></div>
        <div class="skeleton" style="height:14px;width:70%;"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'https://labor-headline-block-tough.trycloudflare.com';

    // ─── SESSION ─────────────────────────────────────────────
    const accessToken  = localStorage.getItem('bv_access')  || null;
    const refreshToken = localStorage.getItem('bv_refresh') || null;
    let   currentUser  = null;

    async function apiFetch(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
      return fetch(API + path, { ...options, headers });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function isOnline(lastSeen) {
      return lastSeen && (Date.now() - new Date(lastSeen).getTime()) < 3 * 60 * 1000;
    }

    // ─── LOAD SELF ───────────────────────────────────────────
    async function loadSelf() {
      if (!accessToken) return;
      const res = await apiFetch('/api/me');
      if (res.ok) currentUser = await res.json();
      renderTopbar();
    }

    function renderTopbar() {
      const el = document.getElementById('topbarAuth');
      if (currentUser) {
        const initials = (currentUser.display_name || currentUser.username || '?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">
          <a href="/" style="font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;">Home</a>
          <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#06B6D4);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;font-family:'Nunito',sans-serif;color:#fff;overflow:hidden;">
            ${currentUser.avatar_url ? `<img src="${currentUser.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : initials}
          </div>
        </div>`;
      } else {
        el.innerHTML = `<a href="/" style="font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;">Log in</a>`;
      }
    }

    // ─── LOAD PROFILE ────────────────────────────────────────
    async function loadProfile() {
      const params   = new URLSearchParams(window.location.search);
      const username = params.get('u');
      if (!username) { renderNotFound(); return; }

      document.title = `@${username} — Brickverse`;

      const res = await fetch(`${API}/api/users/${username}`);
      if (!res.ok) { renderNotFound(); return; }
      const profile = await res.json();

      // Friends status
      let friendStatus = null;
      let isSelf = false;
      if (currentUser) {
        isSelf = currentUser.id === profile.id;
        if (!isSelf) {
          const fr = await apiFetch('/api/friends');
          if (fr.ok) {
            const friends = await fr.json();
            const rel = friends.find(f => f.id === profile.id);
            if (rel) friendStatus = rel.status === 'accepted' ? 'friends' : (rel.requested_by === currentUser.id ? 'sent' : 'incoming');
          }
        }
      }

      renderProfile(profile, isSelf, friendStatus);
    }

    function renderProfile(p, isSelf, friendStatus) {
      const initials = (p.display_name || p.username || '?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const online   = isOnline(p.last_seen);
      const joined   = new Date(p.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      let actionBtns = '';
      if (isSelf) {
        actionBtns = `<button class="btn btn-ghost" onclick="window.location='/'">Edit Profile</button>`;
      } else if (!currentUser) {
        actionBtns = `<button class="btn btn-primary" onclick="window.location='/'">Sign in to add</button>`;
      } else if (friendStatus === 'friends') {
        actionBtns = `
          <button class="btn btn-ghost" onclick="openDMFromProfile('${p.username}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Message
          </button>
          <button class="btn btn-danger" onclick="removeFriend('${p.username}')">Remove Friend</button>`;
      } else if (friendStatus === 'sent') {
        actionBtns = `<button class="btn btn-ghost" disabled style="opacity:0.5;cursor:default;">Request Sent</button>`;
      } else if (friendStatus === 'incoming') {
        actionBtns = `
          <button class="btn btn-primary" onclick="respondFriend('${p.username}','accept')">Accept Request</button>
          <button class="btn btn-ghost" onclick="respondFriend('${p.username}','decline')">Decline</button>`;
      } else {
        actionBtns = `<button class="btn btn-primary" onclick="addFriend('${p.username}')">Add Friend</button>`;
      }

      document.getElementById('profileContent').innerHTML = `
        <div class="profile-banner"></div>
        <div class="profile-card">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar">
              ${p.avatar_url ? `<img src="${p.avatar_url}" alt="avatar" />` : initials}
            </div>
            <div class="profile-actions">${actionBtns}</div>
          </div>
          ${online ? '<div class="online-pill"><div class="online-dot-sm"></div>Online now</div>' : ''}
          <div class="profile-display-name">${p.display_name || p.username}</div>
          <div class="profile-username">@${p.username} · Joined ${joined}</div>
          ${p.bio ? `<div class="profile-bio">${escapeHtml(p.bio)}</div>` : ''}
          <div class="profile-stats">
            <div class="profile-stat">
              <div class="profile-stat-num">${(p.bricks || 0).toLocaleString()}</div>
              <div class="profile-stat-label">Bricks</div>
            </div>
          </div>
        </div>

        <div class="profile-tabs">
          <button class="profile-tab active" onclick="switchTab(this,'gamesTab')">Games</button>
          <button class="profile-tab" onclick="switchTab(this,'aboutTab')">About</button>
        </div>

        <div id="gamesTab">
          <div class="empty-state"><p>No games published yet.</p></div>
        </div>
        <div id="aboutTab" style="display:none;">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">
            <div style="font-size:13px;color:var(--muted);line-height:1.8;">
              <div style="margin-bottom:8px;"><span style="color:var(--text);font-weight:700;">Username</span> &nbsp; @${p.username}</div>
              <div style="margin-bottom:8px;"><span style="color:var(--text);font-weight:700;">Joined</span> &nbsp; ${joined}</div>
              <div><span style="color:var(--text);font-weight:700;">Bricks</span> &nbsp; ${(p.bricks || 0).toLocaleString()}</div>
              ${p.bio ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);color:var(--text);">${escapeHtml(p.bio)}</div>` : ''}
            </div>
          </div>
        </div>`;
    }

    function renderNotFound() {
      document.getElementById('profileContent').innerHTML = `
        <div class="empty-state" style="margin-top:40px;">
          <p style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;">User not found</p>
          <p>This account doesn't exist or may have been removed.</p>
          <a href="/" class="btn btn-primary" style="margin-top:16px;display:inline-flex;">Go Home</a>
        </div>`;
    }

    function switchTab(btn, tabId) {
      document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      ['gamesTab','aboutTab'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = id === tabId ? 'block' : 'none';
      });
    }

    // ─── FRIEND ACTIONS ──────────────────────────────────────
    async function addFriend(username) {
      const res = await apiFetch(`/api/friends/request/${username}`, { method: 'POST' });
      if (res.ok) { showToast('Friend request sent!'); loadProfile(); }
      else { const d = await res.json(); showToast(d.error, 'error'); }
    }

    async function respondFriend(username, action) {
      const res = await apiFetch(`/api/friends/respond/${username}`, {
        method: 'POST', body: JSON.stringify({ action }),
      });
      if (res.ok) { showToast(action === 'accept' ? 'Friend added!' : 'Request declined.'); loadProfile(); }
    }

    async function removeFriend(username) {
      const res = await apiFetch(`/api/friends/${username}`, { method: 'DELETE' });
      if (res.ok) { showToast('Friend removed.'); loadProfile(); }
    }

    async function openDMFromProfile(username) {
      window.location.href = `/?dm=${encodeURIComponent(username)}`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── INIT ─────────────────────────────────────────────────
    (async () => {
      await loadSelf();
      await loadProfile();
    })();
  </script>
</body>
</html>
